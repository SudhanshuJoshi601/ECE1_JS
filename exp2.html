<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Lab Expected Output</title>
<link rel="stylesheet" href="exp2.css">
</head>
<body>
<div class="card-container">
<div class="card">
<h1 id="mainHeading">Welcome to JavaScript Lab</h1>
<input type="text" id="textInput" placeholder="Enter new heading text">
<div class="button-group top-buttons">
<button id="updateHeadingBtn" class="blue-btn">Change Heading</button>
<button id="changeColorBtn" class="blue-btn">Change Background</button>
<button id="increase FontBtn" class="blue-btn">Increase Font Size</button>
</div>
<div class="button-group bottom-buttons">
<button id="toggleParaBtn" class="blue-btn">Show/Hide Paragraph</button>
<button id="resetBtn" class="blue-btn">Reset</button>
</div>
<p id="sampleParagraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
</div>
</div>
<script src="exp2.js"></script>
</body>
</html>
